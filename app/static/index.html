<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRUPO BOLHÃO</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
.wrap{padding:20px}
.hidden{display:none}
button{padding:10px;border:none;border-radius:8px;background:#22c55e;color:black;font-weight:bold;cursor:pointer}
button.secondary{background:#1f2937;color:white}
button.red{background:#ef4444;color:white}
input,select{padding:10px;border-radius:8px;border:1px solid #333;background:#111;color:white;width:100%}
.panel{background:#111827;padding:15px;border-radius:12px;margin-bottom:15px}
table{width:100%;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid #333}
.pill{padding:4px 8px;border-radius:999px;font-size:12px}
.sale{background:green}
.entry{background:orange}
.expense{background:red}
</style>
</head>

<body>

<div class="wrap">

<h1>GRUPO BOLHÃO</h1>

<!-- MENU -->
<div>
<button onclick="showTab('purchases')">Compras</button>
<button onclick="showTab('suppliers')" class="secondary">Fornecedores</button>
</div>

<!-- ================= COMPRAS ================= -->
<div id="purchases" class="panel">

<h2>Artigos a Comprar</h2>

<label>Artigo</label>
<select id="purchaseArticle"></select>

<label>Código</label>
<input id="purchaseCode" readonly>

<label>Fornecedor</label>
<select id="purchaseSupplier"></select>

<label>Qtd comprar</label>
<input id="purchaseQtyToBuy" type="number">

<label>Qtd comprada</label>
<input id="purchaseQtyBought" type="number">

<br><br>
<button onclick="addPurchase()">Guardar</button>

<br><br>

<div id="purchasesWrap"></div>

</div>

<!-- ================= FORNECEDORES ================= -->
<div id="suppliers" class="panel hidden">
<h2>Fornecedores</h2>
<div id="suppliersWrap"></div>
</div>

</div>

<script>

const state = {
  masterArticles: [],
  suppliers: [],
  purchases: []
};

function api(url, options = {}) {
  return fetch(url, {
    headers: { 'Content-Type': 'application/json' },
    ...options
  }).then(r => r.json());
}

/* ================= LOAD ================= */

async function loadAll() {
  const [articles, suppliers, purchases] = await Promise.all([
    api('/api/master/articles'),
    api('/api/master/suppliers'),
    api('/api/purchases')
  ]);

  state.masterArticles = articles;
  state.suppliers = suppliers;
  state.purchases = purchases;

  renderArticles();
  renderSuppliersSelect();
  renderSuppliers();
  renderPurchases();
}

/* ================= UI ================= */

function showTab(tab){
  document.getElementById('purchases').classList.add('hidden');
  document.getElementById('suppliers').classList.add('hidden');

  document.getElementById(tab).classList.remove('hidden');
}

/* ================= ARTIGOS ================= */

function renderArticles(){
  const sel = document.getElementById('purchaseArticle');

  sel.innerHTML =
    '<option value="">Selecionar</option>' +
    state.masterArticles.map((a,i)=>
      `<option value="${i}">${a.code} - ${a.name}</option>`
    ).join('');
}

document.getElementById('purchaseArticle').onchange = () => {
  const idx = document.getElementById('purchaseArticle').value;
  if(idx===""){
    document.getElementById('purchaseCode').value="";
    return;
  }

  const a = state.masterArticles[idx];
  document.getElementById('purchaseCode').value = a.code;
};

/* ================= FORNECEDORES ================= */

function renderSuppliersSelect(){
  const sel = document.getElementById('purchaseSupplier');

  sel.innerHTML =
    '<option value="">Selecionar</option>' +
    state.suppliers.map((s,i)=>
      `<option value="${i}">${s.code} - ${s.name}</option>`
    ).join('');
}

function renderSuppliers(){
  const wrap = document.getElementById('suppliersWrap');

  wrap.innerHTML = state.suppliers.map(s=>`
    <div class="panel">
      ${s.code} - ${s.name}
    </div>
  `).join('');
}

/* ================= COMPRAS ================= */

function status(p){
  if(p.qty_bought==0) return '<span class="pill expense">Por comprar</span>';
  if(p.qty_bought<p.qty_to_buy) return '<span class="pill entry">Parcial</span>';
  return '<span class="pill sale">Comprado</span>';
}

function renderPurchases(){
  const wrap = document.getElementById('purchasesWrap');

  if(!state.purchases.length){
    wrap.innerHTML="Sem artigos";
    return;
  }

  wrap.innerHTML = `
  <table>
    <tr>
      <th>Código</th>
      <th>Artigo</th>
      <th>Fornecedor</th>
      <th>Qtd comprar</th>
      <th>Qtd comprada</th>
      <th>Estado</th>
    </tr>
    ${state.purchases.map(p=>`
      <tr>
        <td>${p.code}</td>
        <td>${p.name}</td>
        <td>${p.supplier}</td>
        <td>${p.qty_to_buy}</td>
        <td>${p.qty_bought}</td>
        <td>${status(p)}</td>
      </tr>
    `).join('')}
  </table>
  `;
}

async function addPurchase(){

  const aIdx = document.getElementById('purchaseArticle').value;
  const sIdx = document.getElementById('purchaseSupplier').value;

  if(aIdx==="") return alert("Seleciona artigo");
  if(sIdx==="") return alert("Seleciona fornecedor");

  const article = state.masterArticles[aIdx];
  const supplier = state.suppliers[sIdx];

  await api('/api/purchases',{
    method:'POST',
    body:JSON.stringify({
      code:article.code,
      name:article.name,
      supplier:supplier.name,
      supplier_code:supplier.code,
      qty_to_buy:document.getElementById('purchaseQtyToBuy').value,
      qty_bought:document.getElementById('purchaseQtyBought').value
    })
  });

  loadAll();
}

/* ================= START ================= */

loadAll();

</script>

</body>
</html>
