<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRUPO BOLHÃO</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6fb}
.hidden{display:none}

.app{display:grid;grid-template-columns:250px 1fr;height:100vh}

.side{background:#111827;color:#fff;padding:20px}
.side button{width:100%;margin-bottom:10px;padding:10px;border:none;border-radius:8px;background:#1f2937;color:#fff;cursor:pointer}
.side button:hover{background:#374151}

.main{padding:20px;overflow:auto}

.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px}

.btn{background:#b91c1c;color:#fff;padding:10px;border:none;border-radius:8px;cursor:pointer}
.btn:hover{background:#991b1b}
.btn.blue{background:#1d4ed8}

.actions{display:flex;gap:10px;margin-bottom:10px}

table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #ddd;text-align:left}

input,select{padding:8px;width:100%;margin-bottom:10px}

.title{font-size:22px;margin-bottom:10px}
</style>
</head>

<body>

<div id="appScreen" class="app">

<!-- MENU -->
<div class="side">
  <h2>GRUPO BOLHÃO</h2>

  <button onclick="showTab('dashboard')">Dashboard</button>
  <button onclick="showTab('caixa')">Fecho de Caixa</button>
  <button onclick="showTab('compras')">Compras</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="tab">
  <div class="title">Dashboard</div>
  <div class="card">Resumo geral</div>
</div>

<!-- CAIXA -->
<div id="caixa" class="tab hidden">
  <div class="title">Fecho de Caixa</div>

  <!-- 🔥 BOTÕES -->
  <div class="card">
    <div class="actions">
      <button class="btn blue" onclick="window.location.href='/api/export/cash/excel'">
        Exportar Excel
      </button>

      <button class="btn blue" onclick="window.location.href='/api/export/cash/pdf'">
        Exportar PDF
      </button>
    </div>
  </div>

  <div class="card">
    <label>Fundo inicial</label>
    <input id="cashStart" type="number">

    <label>Entradas</label>
    <input id="cashIn" type="number">

    <label>Saídas</label>
    <input id="cashOut" type="number">
  </div>
</div>

<!-- COMPRAS -->
<div id="compras" class="tab hidden">
  <div class="title">Artigos a Comprar</div>

  <!-- 🔥 BOTÕES -->
  <div class="card">
    <div class="actions">
      <button class="btn blue" onclick="window.location.href='/api/export/purchases/excel'">
        Exportar Excel
      </button>

      <button class="btn blue" onclick="window.location.href='/api/export/purchases/pdf'">
        Exportar PDF
      </button>
    </div>
  </div>

  <div class="card">
    <label>Artigo</label>
    <input id="item">

    <label>Quantidade</label>
    <input id="qty" type="number">

    <button class="btn" onclick="addItem()">Adicionar</button>
  </div>

  <div class="card">
    <table id="tbl">
      <thead>
        <tr>
          <th>Artigo</th>
          <th>Quantidade</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

</div>
</div>

<script>
function showTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.add('hidden'))
  document.getElementById(tab).classList.remove('hidden')
}

function addItem(){
  const item = document.getElementById('item').value
  const qty = document.getElementById('qty').value

  const row = `<tr><td>${item}</td><td>${qty}</td></tr>`
  document.querySelector('#tbl tbody').innerHTML += row

  document.getElementById('item').value=''
  document.getElementById('qty').value=''
}
</script>

</body>
</html>
